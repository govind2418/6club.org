<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 720" width="640" height="720" role="img" aria-label="Gold trophy, casino chips and coins on a luxury black background">
  <defs>
    <radialGradient id="heroGlow" cx="50%" cy="38%" r="60%">
      <stop offset="0" stop-color="#F4C542" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#F4C542" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="silGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2f12"/>
      <stop offset="0.5" stop-color="#1c1706"/>
      <stop offset="1" stop-color="#0a0800"/>
    </linearGradient>
    <linearGradient id="metalGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF6DA"/>
      <stop offset="0.45" stop-color="#F4C542"/>
      <stop offset="1" stop-color="#C89616"/>
    </linearGradient>
    <linearGradient id="chipRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a51414"/>
      <stop offset="1" stop-color="#7A0B0B"/>
    </linearGradient>
    <radialGradient id="coinFace" cx="35%" cy="30%" r="70%">
      <stop offset="0" stop-color="#FFF6DA"/>
      <stop offset="0.5" stop-color="#F4C542"/>
      <stop offset="1" stop-color="#C89616"/>
    </radialGradient>
  </defs>

  <rect width="640" height="720" fill="none"/>
  <circle cx="330" cy="270" r="300" fill="url(#heroGlow)"/>

  <!-- Elegant silhouette (rim-lit bust profile, fully original abstract shape) -->
  <g opacity="0.9">
    <path d="M330 90c-58 0-104 46-104 108 0 34 14 62 36 82-46 22-78 66-84 150-2 30-4 78-4 110h312c0-32-2-80-4-110-6-84-38-128-84-150 22-20 36-48 36-82 0-62-46-108-104-108z" fill="url(#silGold)"/>
    <path d="M330 90c-58 0-104 46-104 108 0 34 14 62 36 82-46 22-78 66-84 150-2 30-4 78-4 110h6c2-98 24-176 78-208 16-10 34-16 52-16v-226z" fill="#F4C542" opacity="0.12"/>
  </g>

  <!-- Trophy -->
  <g transform="translate(432 300)">
    <path d="M-42-58h84v10c0 34-18 56-42 62-24-6-42-28-42-62z" fill="url(#metalGold)"/>
    <path d="M42-52c18 2 30 14 30 30 0 20-16 34-34 36l-4-14c12-2 20-10 20-22 0-10-6-16-14-18z" fill="url(#metalGold)"/>
    <path d="M-42-52c-18 2-30 14-30 30 0 20 16 34 34 36l4-14c-12-2-20-10-20-22 0-10 6-16 14-18z" fill="url(#metalGold)"/>
    <rect x="-8" y="14" width="16" height="26" fill="url(#metalGold)"/>
    <path d="M-34 40h68l6 22h-80z" fill="url(#metalGold)"/>
    <rect x="-40" y="62" width="80" height="12" rx="3" fill="#C89616"/>
  </g>

  <!-- Poker chip stack -->
  <g transform="translate(178 470)">
    <ellipse cx="0" cy="36" rx="64" ry="18" fill="url(#chipRed)"/>
    <ellipse cx="0" cy="36" rx="64" ry="18" fill="none" stroke="#FFF6DA" stroke-opacity="0.25" stroke-width="4" stroke-dasharray="6 10"/>
    <ellipse cx="0" cy="14" rx="64" ry="18" fill="url(#metalGold)"/>
    <ellipse cx="0" cy="14" rx="64" ry="18" fill="none" stroke="#7A0B0B" stroke-opacity="0.4" stroke-width="4" stroke-dasharray="6 10"/>
    <ellipse cx="0" cy="-8" rx="64" ry="18" fill="url(#chipRed)"/>
    <ellipse cx="0" cy="-8" rx="64" ry="18" fill="none" stroke="#FFF6DA" stroke-opacity="0.25" stroke-width="4" stroke-dasharray="6 10"/>
  </g>

  <!-- Scattered coins -->
  <circle cx="500" cy="560" r="30" fill="url(#coinFace)"/>
  <circle cx="500" cy="560" r="30" fill="none" stroke="#7A4A00" stroke-opacity="0.35" stroke-width="3"/>
  <circle cx="90" cy="180" r="22" fill="url(#coinFace)"/>
  <circle cx="560" cy="160" r="16" fill="url(#coinFace)"/>
  <circle cx="120" cy="600" r="18" fill="url(#coinFace)"/>
  <circle cx="330" cy="640" r="14" fill="url(#coinFace)"/>

  <!-- Sparkles -->
  <g fill="#FFF6DA">
    <path d="M170 90l4 12 12 4-12 4-4 12-4-12-12-4 12-4z"/>
    <path d="M520 380l3 9 9 3-9 3-3 9-3-9-9-3 9-3z"/>
    <path d="M96 380l3 9 9 3-9 3-3 9-3-9-9-3 9-3z"/>
  </g>
</svg>
